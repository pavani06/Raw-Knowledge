# Análise de Conhecimento Não-Óbvio: 12-Factor Agents (Dex Horthy)
#
# Convenções:
# - type: análise estruturada derivada de source (não é source, concept, entity, nem digest padrão)
# - Estrutura: frameworks, patterns, operational_lessons, tradeoffs, failure_patterns, synthesis
# - Todo claim é rastreável à transcrição em sources/2026-06-09-12-factor-agents.md
# - Sem marketing, anedotas, histórias pessoais, repetição

meta:
  title: "12-Factor Agents — Extração de Conhecimento Não-Óbvio"
  derived_from: "[[sources/2026-06-09-12-factor-agents]]"
  speaker: "Dex Horthy"
  channel: "AI Engineer"
  talk: "12-Factor Agents: Patterns of reliable LLM applications"
  created: 2026-06-09
  type: analysis
  extraction_rules:
    keep:
      - frameworks
      - patterns
      - architectures
      - workflows
      - implementation_details
      - operational_lessons
      - failures
      - tradeoffs
    ignore:
      - marketing
      - anecdotes
      - personal_stories
      - repetition

frameworks:
  - name: "Agent Loop Decomposition"
    factor: "Factors 3, 5"
    description: >
      O agente é decomposto em quatro componentes que o builder deve possuir diretamente,
      não delegar a um framework.
    components:
      - name: prompt
        role: "instruções sobre como selecionar o próximo passo"
      - name: switch_statement
        role: "recebe JSON de saída do modelo e decide deterministicamente o que fazer"
      - name: context_builder
        role: "como o histórico é montado e passado ao modelo — formato, densidade, limpeza"
      - name: loop
        role: "determina quando, onde, como e por que sair; permite break, switch, summarize, LM as judge"
    non_obvious_implication: >
      Possuir o loop permite injetar operações arbitrárias (sumarização, validação por outro LLM,
      interrupção para aprovação humana) sem que o framework precise saber. O loop deixa de ser
      caixa-preta do runtime para ser código de aplicação comum.

  - name: "Micro-Agents Architecture"
    factor: "Factor 10"
    description: >
      Pequenos loops de agente (3-10 passos) embutidos em DAGs majoritariamente determinísticos.
    structure: "[DAG determinístico] → [micro-agent loop: 3-10 passos] → [DAG determinístico]"
    characteristics:
      - "O DAG é majoritariamente determinístico; apenas nós específicos contêm agent loops"
      - "Cada micro-agent tem responsabilidade clara e escopo limitado"
      - "O modelo não decide o DAG inteiro, apenas o próximo passo dentro de um nó predeterminado"
    concrete_example:
      system: "HumanLayer deploy pipeline"
      flow:
        - "CI/CD determinístico executa build e testes"
        - "PR mergeado → agent decide ordem de deploy (frontend/backend)"
        - "Proposta enviada para aprovação humana"
        - "Deploy executado deterministicamente"
        - "Testes E2E contra prod (determinístico)"
        - "Se falha → rollback agent (outro micro-agent, mesma estrutura)"
    tradeoff:
      gain: "Previsibilidade, debugabilidade, contextos pequenos e focados"
      cost: "Mais código determinístico para escrever e manter; menos 'mágica' autônoma"

  - name: "Scaffolding vs Wrapper"
    factor: "Factor 12"
    description: >
      Distinção emprestada do ecossistema frontend aplicada a agent frameworks.
    models:
      - name: wrapper
        example: "Bootstrap CSS"
        ownership: "O framework é uma dependência opaca; você configura parâmetros"
      - name: scaffolding
        example: "shadcn/ui"
        ownership: "O código é copiado para o seu projeto; você possui e modifica"
    application_to_agents: >
      create-12-factor-agent gera código que você possui. Quando o agente chega a 70-80%
      e precisa dos últimos 20%, você edita o prompt diretamente no seu código, em vez de
      fazer engenharia reversa de call stacks do framework.
    tradeoff:
      gain: "Código que você entende e modifica; sem camadas opacas"
      cost: "Duplicação de código entre projetos; sem atualizações automáticas do framework"

patterns:
  - name: "Tool Use is Harmful Reframe"
    factor: "Factor 4"
    thesis: >
      Tool use é uma abstração errada. Na prática, "tools" são JSON gerado pelo LLM +
      dispatch determinístico por código. Não há nada mágico no mecanismo.
    practical_decomposition:
      illusion: "agent.use_tool('send_email', to='...', body='...')"
      reality:
        - "llm.generate(prompt) → produz JSON"
        - "deterministic_handler(json_output) → switch statement processa"
        - "append_to_context(result) → resultado vai para o context window"
    design_consequences:
      - "O dispatch handler pode ser testado deterministicamente, sem LLM"
      - "Cada dispatch pode ser versionado, logado e auditado como operação de software normal"
      - "Validação, rate limiting e circuit breaking podem ser adicionados no switch statement"
      - "O loop de erro (tool call falha → erro no context → retry) fica visível e controlável"

  - name: "First Token as Intent Routing"
    factor: "Factor 8"
    description: >
      A distinção entre tool call e mensagem para humano é empurrada para o primeiro token
      de linguagem natural gerado pelo modelo, em vez de ser um campo separado no schema.
    traditional_schema:
      action_field: "type: 'tool_call' | 'message'"
    proposed_pattern:
      first_token_examples:
        - token: "I'll send an email to..."
          intent: "dispatch para ferramenta"
        - token: "I need clarification on..."
          intent: "mensagem para humano"
        - token: "The task is complete."
          intent: "finalizar"
    rationale: >
      O primeiro token é onde o modelo coloca mais massa de probabilidade e onde o sampling
      tem mais impacto. A decisão de routing acontece no ponto de maior confiança do modelo.
      O modelo "entende" linguagem natural melhor do que schemas de ação.
    implication: >
      Ganha-se múltiplas intenções sem enum fechado — o modelo pode expressar
      "preciso falar com um manager" sem hardcoding no schema.

  - name: "Context Serialization for Pause/Resume"
    factor: "Factor 7"
    description: >
      Serializar o context window para banco de dados permite pausar e retomar agentes
      de forma transparente.
    flow:
      - step: 1
        action: "Requisição entra → contexto carregado do banco"
      - step: 2
        action: "LLM decide próximo passo → pode ser long-running tool call"
      - step: 3
        action: "Contexto serializado → salvo no banco com state_id"
      - step: 4
        action: "Workflow interrompido (ferramenta executa async)"
      - step: 5
        action: "Callback chega com state_id + resultado"
      - step: 6
        action: "Contexto carregado do banco via state_id"
      - step: 7
        action: "Resultado appendado ao contexto"
      - step: 8
        action: "Contexto reenviado ao LLM"
    non_obvious_detail: >
      O agente não sabe que houve pausa. Do ponto de vista do LLM, o próximo prompt contém
      o histórico completo como se nada tivesse acontecido em background.
    precondition: "Possuir o context window (Factor 3). Se um framework monta o contexto internamente, a serialização é impossível."

  - name: "Error Cleanup in Context Window"
    factor: "Factor 3"
    rules:
      - "Quando um tool call falha e depois um subsequente é bem-sucedido: limpar todos os erros pendentes"
      - "Sumarizar erros — nunca incluir stack traces completos"
      - "Nunca fazer append cego de toda resposta no contexto"
    failure_mode: >
      Erros acumulados no context window causam 'spiral out': o agente alucina sobre erros
      passados, tenta corrigir problemas já resolvidos, ou entra em loop de retry porque
      o contexto está poluído com informação de falha.

operational_lessons:
  - name: "The 70-80% Quality Trap"
    description: >
      Frameworks permitem chegar a 70-80% de qualidade rapidamente — suficiente para demo
      ou para convencer stakeholders. Os últimos 20% exigem possuir os internals (prompts,
      contexto, control flow). Quem não possui fica preso fazendo engenharia reversa de
      call stacks do framework.
    failure_pattern: >
      Time escala baseado na demo de 80%, depois descobre que não consegue ir além sem
      reescrever. Acaba jogando tudo fora e começando do zero.
    anti_solution: >
      Tentar resolver os 20% finais adicionando mais detalhes ao prompt dentro do framework,
      sem acesso ao context builder. Exemplo: DevOps agent onde duas horas de prompt
      engineering reproduziram o que um bash script faria em 90 segundos.

  - name: "Not Every Problem Needs an Agent"
    heuristic: >
      Se o problema pode ser resolvido deterministicamente com um script simples,
      não use um agente. Teste: você conseguiria escrever a solução em bash/python
      em menos de 2 minutos?
    case_study:
      problem: "Executar passos de build em ordem"
      agent_attempt: "Duas horas refinando prompt com a ordem exata de cada passo"
      outcome: "Prompt virou essencialmente um bash script em linguagem natural — mais verboso e menos confiável"
      correct_solution: "Bash script de 90 segundos"

  - name: "Long Contexts Degrade Reliability"
    observation: >
      Mesmo com APIs que aceitam 2M tokens, colocar muitos tokens no contexto sempre degrada
      a qualidade comparado a um contexto menor e mais curado.
    implication: >
      O agente com loop simples (append tudo ao contexto até o LLM dizer 'pronto') não funciona
      para workflows longos. A solução é arquitetar contextos pequenos e focados (micro-agents),
      não esperar que modelos melhorem com contextos gigantes.

  - name: "Bleeding Edge Strategy"
    description: >
      Encontre algo exatamente no limite do que o modelo consegue fazer de forma confiável
      (não acerta 100%). Se você conseguir fazer isso funcionar de forma confiável através
      de engenharia de harness, você criou algo que ninguém mais consegue replicar.
    attribution: "Estratégia atribuída ao time do NotebookLM"
    key_insight: >
      Não use o modelo para o que ele já faz perfeitamente, nem para o que ele comprovadamente
      não consegue — use na fronteira onde engenharia de sistema faz a diferença.

tradeoffs:
  - decision: "Micro-agents em DAG determinístico vs. agente autônomo monolítico"
    gain: "Previsibilidade, debugabilidade, contextos pequenos"
    cost: "Mais código determinístico para escrever e manter; menos 'mágica'"
  - decision: "Possuir o context window vs. delegar ao framework"
    gain: "Controle sobre densidade de tokens, pause/resume, limpeza de erros"
    cost: "Responsabilidade por formato, serialização, reconstituição"
  - decision: "Scaffolding (shadcn-style) vs. Wrapper (bootstrap-style)"
    gain: "Código que você entende e modifica; sem camadas opacas"
    cost: "Duplicação de código entre projetos; sem atualizações automáticas do framework"
  - decision: "Primeiro token como routing vs. campo de ação no schema"
    gain: "Modelo opera no domínio que entende melhor (linguagem natural); intenções abertas"
    cost: "Perda de garantias estruturais; parsing de intenção é fuzzy"
  - decision: "Framework abstrai infra vs. framework abstrai AI"
    gain: "Builders focam em prompts, contexto, eval — o que diferencia qualidade"
    cost: "Infraestrutura (state, human contact, serialização) vira responsabilidade do framework, exigindo confiança no fornecedor"
  - decision: "Stateless agents + state externo vs. stateful agents"
    gain: "Reconstituição, pause/resume, debug via inspeção de estado"
    cost: "Complexidade de gerenciar estado externo; latência de serialização/desserialização"

failure_patterns:
  - pattern: "Append cego de erros no contexto"
    consequence: "Spiral out, perda de contexto, loops de retry infinitos"
  - pattern: "Delegar o context window ao framework"
    consequence: "Impossibilidade de limpar, sumarizar ou otimizar tokens; perda de qualidade em workflows longos"
  - pattern: "Começar com framework que abstrai AI parts"
    consequence: "Os 20% finais de qualidade são inalcançáveis sem reescrever"
  - pattern: "Agente autônomo para problemas determinísticos"
    consequence: "Horas de prompt engineering para reproduzir o que um script faria em segundos"
  - pattern: "Contexto monolítico crescente"
    consequence: "Degradação de qualidade proporcional ao tamanho do contexto, mesmo em modelos com janelas grandes"
  - pattern: "Schema rígido para intenção do agente"
    consequence: "Impede o modelo de expressar nuances como 'preciso de aprovação de um manager' sem redefinir o schema"

synthesis:
  unifying_principle: >
    Context engineering é a disciplina unificada. Prompt, memória, RAG, histórico —
    tudo é 'como colocar os tokens certos no modelo'. O harness (switch, loop, state,
    serialização) existe para servir o contexto, não o contrário.
  implications:
    - "Frameworks devem expor o context builder como API pública, não como detalhe interno"
    - "Testes de agente devem incluir testes do contexto montado (snapshot testing de tokens)"
    - "A otimização principal não é de latência ou throughput do LLM — é de densidade de informação por token no contexto"
